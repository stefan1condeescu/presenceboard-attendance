services:
  - type: web
    name: presenceboard-attendance
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: presenceboard-attendance-db
          property: connectionString
      - key: DB_SSL
        value: "false"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: presenceboard-attendance-db
    plan: free
    region: frankfurt
    databaseName: presenceboard
    user: presenceboard_user
    ipAllowList: []
